name: Update Formula on Release

on:
  repository_dispatch:
    types: [formula-update]
  workflow_dispatch:
    inputs:
      project:
        required: true
        type: string
        description: "Project name (clio, sam, etc.)"
      version:
        required: true
        type: string
        description: "Release version tag"
      download_url:
        required: true
        type: string
        description: "URL to release tarball"

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Extract inputs
        id: inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PROJECT: ${{ github.event.client_payload.project }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_URL: ${{ github.event.client_payload.download_url }}
          INPUT_PROJECT: ${{ inputs.project }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_URL: ${{ inputs.download_url }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "project=$DISPATCH_PROJECT" >> $GITHUB_OUTPUT
            echo "version=$DISPATCH_VERSION" >> $GITHUB_OUTPUT
            echo "download_url=$DISPATCH_URL" >> $GITHUB_OUTPUT
          else
            echo "project=$INPUT_PROJECT" >> $GITHUB_OUTPUT
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "download_url=$INPUT_URL" >> $GITHUB_OUTPUT
          fi

      - name: Checkout homebrew-SAM repo
        uses: actions/checkout@v4

      - name: Download and calculate SHA256
        id: hash
        env:
          PROJECT: ${{ steps.inputs.outputs.project }}
          URL: ${{ steps.inputs.outputs.download_url }}
        run: |
          echo "Downloading: $URL"
          curl -L -o /tmp/$PROJECT.tar.gz "$URL"
          
          SHA256=$(shasum -a 256 /tmp/$PROJECT.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Calculated SHA256: $SHA256"

      - name: Update formula
        env:
          PROJECT: ${{ steps.inputs.outputs.project }}
          VERSION: ${{ steps.inputs.outputs.version }}
          URL: ${{ steps.inputs.outputs.download_url }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          FORMULA="Formula/$PROJECT.rb"
          
          if [ ! -f "$FORMULA" ]; then
            echo "[ERROR] Formula not found: $FORMULA"
            exit 1
          fi
          
          # Update the formula file
          sed -i "s|url \".*\"|url \"$URL\"|" "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" "$FORMULA"
          
          # Verify changes
          echo "Updated $FORMULA:"
          grep -E "url|sha256" "$FORMULA"

      - name: Commit and push
        env:
          PROJECT: ${{ steps.inputs.outputs.project }}
          VERSION: ${{ steps.inputs.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Formula/$PROJECT.rb
          git commit -m "chore($PROJECT): update to $VERSION"
          git push

      - name: Summary
        env:
          PROJECT: ${{ steps.inputs.outputs.project }}
          VERSION: ${{ steps.inputs.outputs.version }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          echo "## Formula Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** $PROJECT" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA256:** $SHA256" >> $GITHUB_STEP_SUMMARY
